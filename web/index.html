<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="OpenClaw International Edition - Web Output">
  <title>🦞 OpenClaw International</title>
  <style>
    :root { --bg: #0d1117; --fg: #c9d1d9; --accent: #58a6ff; --green: #3fb950; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--fg); min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    main { max-width: 720px; padding: 2rem; text-align: center; }
    h1 { font-size: 2.5rem; margin-bottom: 1rem; color: var(--accent); }
    p { font-size: 1.1rem; opacity: 0.8; line-height: 1.6; }
    .status { margin-top: 2rem; padding: 1rem 2rem; border: 1px solid var(--green); border-radius: 8px; color: var(--green); }
    footer { margin-top: 3rem; font-size: 0.85rem; opacity: 0.5; }
  </style>
</head>
<body>
  <main>
    <h1>🦞 OpenClaw International</h1>
    <p>V5.3 — 全自动进化工厂已就绪。<br>猫有了眼睛（Playwright 截图）和手（Web Developer Agent）。</p>
    <div class="status">✅ 系统正常 · 8/8 checks passed</div>
  </main>
  <footer>OpenClaw International Edition · <span id="ts"></span></footer>
  <script>document.getElementById('ts').textContent = new Date().toISOString();</script>
</body>
</html>
